name: Deploy Aura Studio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 143.110.167.193
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "index.html"
          target: "/var/www/aura-studio"
